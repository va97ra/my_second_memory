name: ezhednevnik_v2
description: Local-first mobile memory app with dated items, voice notes, reminders, and a smart feed.
publish_to: "none"

version: 1.0.2+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  record: ^7.1.1
  just_audio: ^0.9.40
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  file_selector: ^1.0.3
  cryptography: ^2.7.0
  image_picker: ^1.2.3
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  drift_dev: ^2.20.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/memory_banner.png
    - assets/images/paper_texture.jpg
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-VariableFont_wght.ttf
